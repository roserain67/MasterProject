# PEARL 默认配置
data_base: "1数据处理/DS02/feature_all/unified"
train_units: [16, 18, 20]
test_units: [14, 15]

# 环境
state_dim: 66
n_actions: 5

# PEARL 架构
z_dim: 8
context_k: 16

# 训练
num_episodes: 800
max_len: 200
batch_size: 64
gamma: 0.99
n_step: 20

# 学习率
lr_encoder: 4.0e-4
lr_actor: 2.0e-4
lr_critic: 5.0e-5

# 探索
init_temp: 1.4
temp_decay_ep: 300
entropy_coef: 0.05

# Critic 稳定性
tau: 0.005
reward_clip: 500
td_clip: 1500
grad_clip: 0.5

# Replay buffer
good_capacity: 80
recent_capacity: 40
replay_good_thresh: -10
replay_min_thresh: -3000

# Curriculum & Collapse
curriculum_ep: 150
warmup_ep: 25
collapse_thresh: 80
collapse_window: 8

# 测试
test_episodes: 300
deterministic_eval: true

# GRU 预训练
pretrain_path: "pretrain/gru_pretrained.pt"

# 日志
log_dir: "logs/compare/PEARL"

